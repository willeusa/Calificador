<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificador Automatizado - Odoo ERP</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (versión para navegador) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <!-- Contenedor donde se montará React -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const RUBRIC_DATA = [
            {
                id: 'c1',
                title: 'Integración de módulos (CE b)',
                levels: {
                    excelente: { score: 9.5, desc: 'Instala módulos y completa flujo de negocio de forma autónoma.' },
                    adecuado: { score: 7, desc: 'Instala y completa flujo, pero requiere asistencia puntual.' },
                    desarrollo: { score: 4.5, desc: 'Instala módulos, incapaz de completar el ciclo sin errores.' },
                    insuficiente: { score: 1.5, desc: 'No logra instalar o no comprende la relación de módulos.' }
                }
            },
            {
                id: 'c2',
                title: 'Elaboración de informes XML (CE g)',
                levels: {
                    excelente: { score: 9.5, desc: 'Localiza vista, inyecta código respetando herencia sin errores.' },
                    adecuado: { score: 7, desc: 'Inyecta código y genera informe, con leves defectos de maquetación.' },
                    desarrollo: { score: 4.5, desc: 'Modifica XML con errores de sintaxis, requiere ayuda del profesor.' },
                    insuficiente: { score: 1.5, desc: 'No localiza la vista o no comprende la inyección QWeb.' }
                }
            },
            {
                id: 'c3',
                title: 'Extracción de información (CE h)',
                levels: {
                    excelente: { score: 9.5, desc: 'Exporta CSV compatible, desglosa Many2one, verifica en VS Code.' },
                    adecuado: { score: 7, desc: 'Exporta CSV, comete errores menores en campos o relaciones.' },
                    desarrollo: { score: 4.5, desc: 'Logra exportar, pero usa formatos incorrectos o rompe codificación.' },
                    insuficiente: { score: 1.5, desc: 'No logra utilizar el asistente o extrae archivos corruptos.' }
                }
            }
        ];

        function App() {
            const [studentName, setStudentName] = useState('');
            const [selections, setSelections] = useState({ c1: null, c2: null, c3: null });
            const [gradebook, setGradebook] = useState([]);

            // Inicializar los iconos de Lucide después del renderizado
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleSelect = (criterionId, level) => {
                setSelections(prev => ({ ...prev, [criterionId]: level }));
            };

            const currentGrade = useMemo(() => {
                let total = 0;
                let count = 0;
                Object.keys(selections).forEach(key => {
                    if (selections[key]) {
                        total += RUBRIC_DATA.find(c => c.id === key).levels[selections[key]].score;
                        count++;
                    }
                });
                return count === 3 ? (total / 3).toFixed(2) : null;
            }, [selections]);

            const saveRecord = () => {
                if (!studentName.trim() || !currentGrade) return;
                
                const newRecord = {
                    id: Date.now(),
                    name: studentName,
                    c1: selections.c1,
                    c2: selections.c2,
                    c3: selections.c3,
                    finalGrade: parseFloat(currentGrade)
                };

                setGradebook([...gradebook, newRecord]);
                setStudentName('');
                setSelections({ c1: null, c2: null, c3: null });
            };

            const removeRecord = (id) => {
                setGradebook(gradebook.filter(record => record.id !== id));
            };

            const exportCSV = () => {
                const headers = ['Alumno', 'Integración (CE b)', 'Informes (CE g)', 'Extracción (CE h)', 'Nota Final'];
                const rows = gradebook.map(r => [
                    r.name, 
                    r.c1.toUpperCase(), 
                    r.c2.toUpperCase(), 
                    r.c3.toUpperCase(), 
                    r.finalGrade
                ]);
                
                let csvContent = "data:text/csv;charset=utf-8," 
                    + headers.join(",") + "\n" 
                    + rows.map(e => e.join(",")).join("\n");
                    
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "calificaciones_sprint_ud7.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getStatusColor = (grade) => {
                if (!grade) return 'text-gray-400';
                if (grade >= 9) return 'text-green-600';
                if (grade >= 5) return 'text-blue-600';
                return 'text-red-600';
            };

            return (
                <div className="p-6 font-sans">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Encabezado */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h1 className="text-2xl font-bold text-slate-800">Calificador Automatizado - Odoo ERP</h1>
                            <p className="text-slate-500 mt-1">Resultado de Aprendizaje 7 (RA7) - Sprint UD7</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {/* Panel de Calificación */}
                            <div className="lg:col-span-2 space-y-4">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-700 mb-2">Nombre del Alumnado</label>
                                        <input 
                                            type="text" 
                                            value={studentName}
                                            onChange={(e) => setStudentName(e.target.value)}
                                            placeholder="Ej. Ana García..."
                                            className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                        />
                                    </div>

                                    <div className="space-y-6">
                                        {RUBRIC_DATA.map((criterion) => (
                                            <div key={criterion.id} className="border border-slate-100 rounded-lg p-4 bg-slate-50/50">
                                                <h3 className="font-semibold text-slate-800 mb-3">{criterion.title}</h3>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                    {Object.entries(criterion.levels).map(([levelKey, levelData]) => {
                                                        const isSelected = selections[criterion.id] === levelKey;
                                                        return (
                                                            <button
                                                                key={levelKey}
                                                                onClick={() => handleSelect(criterion.id, levelKey)}
                                                                className={`p-3 rounded-lg text-left text-sm transition-all border ${
                                                                    isSelected 
                                                                        ? 'bg-blue-50 border-blue-500 ring-1 ring-blue-500 shadow-sm' 
                                                                        : 'bg-white border-slate-200 hover:border-blue-300 hover:bg-slate-50'
                                                                }`}
                                                            >
                                                                <div className={`font-bold capitalize mb-1 ${isSelected ? 'text-blue-700' : 'text-slate-700'}`}>
                                                                    {levelKey}
                                                                </div>
                                                                <div className={`text-xs leading-tight ${isSelected ? 'text-blue-600' : 'text-slate-500'}`}>
                                                                    {levelData.desc}
                                                                </div>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Panel de Resultados y Registro */}
                            <div className="space-y-4">
                                {/* Tarjeta de Nota Actual */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-6">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4">Calificación Final</h2>
                                    
                                    <div className="flex flex-col items-center justify-center p-6 bg-slate-50 rounded-lg border border-slate-100 mb-6">
                                        <span className={`text-5xl font-black ${getStatusColor(currentGrade)}`}>
                                            {currentGrade ? currentGrade : '--'}
                                        </span>
                                        <span className="text-sm font-medium text-slate-500 mt-2 uppercase tracking-wider">
                                            {currentGrade ? (currentGrade >= 5 ? 'Aprobado' : 'Suspenso') : 'Pendiente'}
                                        </span>
                                    </div>

                                    <button
                                        onClick={saveRecord}
                                        disabled={!studentName || !currentGrade}
                                        className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-medium py-3 px-4 rounded-lg transition-colors"
                                    >
                                        <i data-lucide="save" className="w-5 h-5"></i>
                                        Guardar Calificación
                                    </button>
                                </div>

                                {/* Lista de Alumnos Evaluados */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <div className="flex items-center justify-between mb-4">
                                        <h2 className="text-sm font-bold text-slate-800 uppercase tracking-wider">Registro ({gradebook.length})</h2>
                                        {gradebook.length > 0 && (
                                            <button onClick={exportCSV} className="text-green-600 hover:text-green-700 flex items-center gap-1 text-sm font-medium transition-colors">
                                                <i data-lucide="download" className="w-4 h-4"></i> Exportar
                                            </button>
                                        )}
                                    </div>

                                    {gradebook.length === 0 ? (
                                        <div className="text-center py-6 text-slate-400 text-sm flex flex-col items-center gap-2">
                                            <i data-lucide="alert-circle" className="w-6 h-6 mx-auto opacity-50"></i>
                                            No hay alumnos evaluados
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {gradebook.map((record) => (
                                                <div key={record.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100">
                                                    <div>
                                                        <div className="font-semibold text-slate-800 text-sm">{record.name}</div>
                                                        <div className="text-xs text-slate-500 flex gap-2 mt-1">
                                                            <span className={record.finalGrade >= 5 ? 'text-green-600' : 'text-red-500'}>
                                                                Nota: {record.finalGrade}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => removeRecord(record.id)} className="text-slate-400 hover:text-red-500 transition-colors">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
